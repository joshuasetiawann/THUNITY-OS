# THUOS — GRUB boot configuration (used when building a bootable ISO/USB).
# The kernel's Multiboot header requests a linear framebuffer, so GRUB sets a
# graphics mode (VBE on BIOS, GOP on UEFI) and passes it to THUOS.
set timeout=3
set default=0

menuentry "THUOS (THU Kernel)" {
    multiboot /boot/kernel.elf
    boot
}

menuentry "THUOS (force 1024x768x32 framebuffer)" {
    set gfxpayload=1024x768x32
    multiboot /boot/kernel.elf
    boot
}
