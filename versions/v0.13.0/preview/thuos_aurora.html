<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>THUOS · Aurora</title>
<style>
:root{
  --bg0:#05060f; --ink:#f1f5ff; --ink2:#bcc8e8; --ink3:#7d8cb4;
  --teal:#2de2c6; --violet:#8b6dff; --magenta:#ff6db0; --amber:#ffcf76; --green:#54e6a6;
  --accent:#8b6dff;
  --glass:rgba(18,22,40,.62); --glass2:rgba(255,255,255,.04); --edge:rgba(255,255,255,.12);
  --ff:'Inter',ui-sans-serif,system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
  --mono:ui-monospace,'SF Mono','JetBrains Mono',Menlo,Consolas,monospace;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%;background:var(--bg0);color:var(--ink);font-family:var(--ff);
  -webkit-font-smoothing:antialiased;overflow:hidden;user-select:none}
h1,h2,h3,h4{margin:0;font-weight:650;letter-spacing:.2px}
button{font-family:inherit}
.reduce *{animation:none !important;transition:none !important}

/* ---- ambient wallpaper ---- */
#sky{position:fixed;inset:0;z-index:0;background:
  radial-gradient(1100px 760px at 16% 10%,rgba(45,226,198,.12),transparent 60%),
  radial-gradient(1000px 820px at 88% 20%,rgba(139,109,255,.15),transparent 62%),
  radial-gradient(1200px 900px at 62% 104%,rgba(255,109,176,.10),transparent 60%),
  linear-gradient(160deg,#05060f,#080b1a 55%,#06080f)}
#sky.nebula{background:
  radial-gradient(1000px 800px at 20% 20%,rgba(255,109,176,.16),transparent 60%),
  radial-gradient(1100px 820px at 82% 30%,rgba(120,80,255,.18),transparent 62%),
  linear-gradient(150deg,#0a0612,#0a0a1e 60%,#070611)}
#sky.senja{background:
  radial-gradient(1000px 800px at 30% 90%,rgba(255,180,90,.16),transparent 60%),
  radial-gradient(1100px 820px at 80% 10%,rgba(140,90,255,.16),transparent 62%),
  linear-gradient(160deg,#0c0712,#120a18 55%,#08060f)}
#aurora{position:fixed;inset:-25%;z-index:0;filter:blur(85px) saturate(125%);opacity:.5;pointer-events:none}
.band{position:absolute;border-radius:50%;mix-blend-mode:screen;animation:drift 32s ease-in-out infinite}
.b1{width:55vw;height:40vw;left:4%;top:6%;background:radial-gradient(circle,rgba(45,226,198,.85),transparent 65%)}
.b2{width:52vw;height:44vw;right:0;top:0;background:radial-gradient(circle,rgba(139,109,255,.85),transparent 65%);animation-delay:-10s}
.b3{width:60vw;height:42vw;left:22%;bottom:-14%;background:radial-gradient(circle,rgba(255,109,176,.7),transparent 65%);animation-delay:-18s}
@keyframes drift{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(3%,-3%) scale(1.07)}}
#stars{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:.7}
#vignette{position:fixed;inset:0;z-index:2;pointer-events:none;background:radial-gradient(140% 120% at 50% 40%,transparent 56%,rgba(2,3,8,.62))}
#dim{position:fixed;inset:0;z-index:3;pointer-events:none;background:#000;opacity:0;transition:opacity .3s}

/* ---- desktop ---- */
#desk{position:fixed;inset:0;z-index:5}

/* menubar */
#menubar{position:fixed;top:0;left:0;right:0;height:42px;z-index:9000;display:flex;align-items:center;
  justify-content:space-between;padding:0 14px;background:rgba(10,13,26,.5);backdrop-filter:blur(18px) saturate(150%);
  border-bottom:1px solid rgba(255,255,255,.07);font-size:13px}
#menubar .mleft{display:flex;align-items:center;gap:14px}
#menubar .logo{width:22px;height:22px;border-radius:7px;background:radial-gradient(circle at 36% 32%,#fff,#bda9ff 32%,#6f4ff0 66%,#241a63);box-shadow:0 0 16px -3px var(--violet)}
#menubar .appname{font-weight:650;letter-spacing:.4px}
#menubar .mitem{color:var(--ink2);opacity:.85}
#menubar .chip{font-size:10.5px;color:var(--amber);border:1px solid rgba(255,207,118,.35);border-radius:999px;padding:2px 9px;letter-spacing:.4px}
#menubar .mright{display:flex;align-items:center;gap:14px}
#menubar .mr{display:flex;align-items:center;gap:6px;color:var(--ink2);cursor:pointer;padding:4px 8px;border-radius:9px}
#menubar .mr:hover{background:rgba(255,255,255,.08);color:var(--ink)}
#menubar .clock{font-variant-numeric:tabular-nums;font-weight:600}
#menubar .vital{font-family:var(--mono);font-size:11px;color:var(--ink3)}
#menubar .vital b{color:var(--teal)}

/* windows */
.win{position:absolute;min-width:280px;min-height:180px;border-radius:16px;overflow:hidden;
  background:var(--glass);backdrop-filter:blur(22px) saturate(150%);
  border:1px solid var(--edge);box-shadow:0 30px 80px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.06);
  display:flex;flex-direction:column;opacity:0;transform:scale(.97);animation:winin .18s ease forwards}
@keyframes winin{to{opacity:1;transform:scale(1)}}
.win.active{box-shadow:0 36px 100px rgba(0,0,0,.6),0 0 0 1px var(--accent),0 0 60px -16px var(--accent)}
.titlebar{height:42px;flex:0 0 42px;display:flex;align-items:center;gap:10px;padding:0 12px;cursor:grab;
  background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.01));border-bottom:1px solid rgba(255,255,255,.06)}
.titlebar.drag{cursor:grabbing}
.titlebar .wicon{width:24px;height:24px;display:grid;place-items:center;border-radius:8px;background:rgba(255,255,255,.05);
  border:1px solid var(--edge);color:var(--accent)}
.titlebar .wicon svg{width:15px;height:15px}
.titlebar .wtitle{font-size:13.5px;font-weight:600}
.titlebar .wsp{flex:1}
.lights{display:flex;gap:8px;align-items:center;margin-right:5px}
.wbtn{width:12px;height:12px;padding:0;border-radius:50%;border:none;cursor:pointer;position:relative;
  display:grid;place-items:center;transition:.15s}
.wbtn.close{background:#ff5f57}.wbtn.min{background:#febc2e}.wbtn.max{background:#28c840}
.wbtn::after{position:absolute;font-size:9px;font-weight:700;color:rgba(0,0,0,.55);opacity:0;transition:.12s;line-height:1}
.lights:hover .wbtn.close::after{content:"×";opacity:1}
.lights:hover .wbtn.min::after{content:"–";opacity:1}
.lights:hover .wbtn.max::after{content:"+";opacity:1}
.win:not(.active) .wbtn{background:rgba(255,255,255,.22)}
.ci-ic{display:inline-flex;align-items:center;color:var(--ink3);margin-right:9px}
.ci-ic svg{width:15px;height:15px}
.qi svg{width:17px;height:17px}
#menubar .mr svg{width:17px;height:17px}
.winbody{flex:1;overflow:auto;padding:18px 20px;font-size:13.5px;color:var(--ink2);line-height:1.55}
.winbody h3{color:var(--ink);font-size:16px;margin-bottom:4px}
.winbody h4{color:var(--ink);font-size:14px}
.winbody .ps{font-size:11px;color:var(--ink3);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
.winbody p{margin:0 0 12px}
.winbody b{color:var(--ink)}

/* dock */
#dock{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);z-index:9000;display:flex;gap:6px;
  padding:8px;border-radius:20px;background:rgba(12,15,30,.55);backdrop-filter:blur(22px) saturate(150%);
  border:1px solid var(--edge);box-shadow:0 20px 60px rgba(0,0,0,.5)}
.dockitem{position:relative;width:54px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px 2px;border-radius:13px;transition:.16s}
.dockitem:hover{background:rgba(255,255,255,.07);transform:translateY(-3px)}
.dockitem .di{width:42px;height:42px;display:grid;place-items:center;border-radius:13px;
  background:linear-gradient(160deg,rgba(255,255,255,.1),rgba(255,255,255,.03));border:1px solid var(--edge);color:var(--dc,var(--teal));
  box-shadow:0 8px 20px -10px var(--dc,var(--teal)),inset 0 1px 0 rgba(255,255,255,.08)}
.dockitem .di svg{width:23px;height:23px}
.dockitem .dl{font-size:9.5px;color:var(--ink3);letter-spacing:.2px;white-space:nowrap}
.dockitem:hover .dl{color:var(--ink2)}
.dockitem .run{position:absolute;bottom:-2px;left:50%;transform:translateX(-50%);width:5px;height:5px;border-radius:50%;background:transparent}
.dockitem.running .run{background:var(--dc,var(--teal));box-shadow:0 0 8px var(--dc,var(--teal))}
.dockitem.running .di{border-color:var(--dc,var(--teal))}

/* control center */
#cc{position:fixed;top:48px;right:12px;z-index:9500;width:300px;border-radius:18px;padding:16px;
  background:rgba(12,15,30,.92);backdrop-filter:blur(24px);border:1px solid var(--edge);
  box-shadow:0 30px 90px rgba(0,0,0,.6);display:none}
#cc.on{display:block}
#cc h4{font-size:12px;color:var(--ink3);text-transform:uppercase;letter-spacing:1px;margin:4px 2px 10px}
.ccrow{display:flex;align-items:center;justify-content:space-between;padding:9px 0;font-size:13.5px;color:var(--ink2)}
.toggle{width:42px;height:24px;border-radius:999px;background:rgba(255,255,255,.12);position:relative;cursor:pointer;transition:.2s;border:1px solid var(--edge)}
.toggle.on{background:linear-gradient(90deg,var(--teal),var(--violet))}
.toggle i{position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:#fff;transition:.2s}
.toggle.on i{left:20px}
.slider{width:120px;accent-color:var(--violet)}
.swatches{display:flex;gap:8px;margin:6px 2px}
.sw{width:26px;height:26px;border-radius:8px;cursor:pointer;border:2px solid transparent}
.sw.sel{border-color:#fff}
.ccwall{display:flex;gap:8px;margin:6px 2px}
.ccwall button{flex:1;all:unset;cursor:pointer;text-align:center;font-size:11.5px;color:var(--ink2);padding:7px 0;border-radius:10px;border:1px solid var(--edge);background:rgba(255,255,255,.03)}
.ccwall button.sel{border-color:var(--violet);color:var(--ink)}

/* reusable bits */
.cols{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:560px){.cols{grid-template-columns:1fr}}
.card{background:var(--glass2);border:1px solid var(--edge);border-radius:14px;padding:14px 16px}
.list{margin:0;padding:0;list-style:none}
.list li{display:flex;gap:9px;padding:7px 0;font-size:13px;border-top:1px solid rgba(255,255,255,.05)}
.list li:first-child{border-top:none}
.list .yes .m{color:var(--green)}.list .no .m{color:var(--magenta)}.list li .m{flex:0 0 16px;font-weight:700}
.banner{margin-top:14px;border-radius:14px;padding:14px 16px;display:flex;gap:12px;align-items:center;
  background:linear-gradient(90deg,rgba(255,207,118,.12),rgba(255,109,176,.08));border:1px solid rgba(255,207,118,.3)}
.banner b{color:var(--amber)}.banner small{display:block;color:var(--ink3);font-size:11.5px;margin-top:2px}
.tl{display:flex;gap:14px;padding:3px 0}
.tl .rail{flex:0 0 28px;display:flex;justify-content:center;position:relative}
.tl .rail::before{content:"";position:absolute;top:0;bottom:-8px;width:2px;background:rgba(255,255,255,.1)}
.tl:last-child .rail::before{display:none}
.tl .dot{position:relative;z-index:1;width:28px;height:28px;border-radius:50%;display:grid;place-items:center;
  font-family:var(--mono);font-size:11px;font-weight:600;color:var(--bg0);background:var(--teal);box-shadow:0 0 16px -4px var(--teal)}
.tl.risk .dot{background:var(--magenta);box-shadow:0 0 16px -4px var(--magenta)}
.tl .body{flex:1;padding-bottom:12px}.tl h4{font-size:13.5px}.tl .s{font-size:12px;color:var(--ink3);margin-top:2px}
.tl .badge{display:inline-block;margin-top:6px;font-size:10px;color:var(--magenta);border:1px solid rgba(255,109,176,.4);border-radius:999px;padding:1px 8px}
.tl .why{margin-top:8px;font-size:12px;line-height:1.5;color:var(--ink2);background:rgba(255,109,176,.08);border:1px solid rgba(255,109,176,.22);border-radius:10px;padding:8px 11px}
.tl .why b{color:var(--magenta)}
.legend{display:flex;flex-wrap:wrap;gap:16px;margin:8px 0 14px;font-size:12px;color:var(--ink3)}
.legend span{display:flex;align-items:center;gap:7px}
.legend i{width:11px;height:11px;border-radius:50%;display:inline-block}
.gauge{display:flex;align-items:center;gap:10px;margin-top:10px;font-size:12.5px}
.gauge .lab{width:54px;color:var(--ink3);font-family:var(--mono);font-size:11px}
.gauge .track{flex:1;height:7px;border-radius:7px;background:rgba(255,255,255,.07);overflow:hidden}
.gauge .fill{height:100%;border-radius:7px;background:linear-gradient(90deg,var(--teal),var(--violet));transition:width .8s}
.gauge .val{width:40px;text-align:right;font-family:var(--mono);font-size:11px;color:var(--ink)}
.note{font-size:11.5px;color:var(--ink3);margin-top:10px;line-height:1.5}
.kbd{font-family:var(--mono);font-size:11px;border:1px solid var(--edge);border-radius:6px;padding:1px 6px;color:var(--ink2)}
.tiles{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px}
.qbtn{all:unset;cursor:pointer;display:flex;align-items:center;gap:9px;padding:11px 13px;border-radius:12px;
  background:rgba(255,255,255,.04);border:1px solid var(--edge);font-size:13px;color:var(--ink);transition:.16s}
.qbtn:hover{background:rgba(255,255,255,.09);border-color:var(--accent)}
.qbtn .qi{width:26px;height:26px;display:grid;place-items:center;border-radius:8px;background:rgba(255,255,255,.06);color:var(--accent)}

/* terminal */
.term{font-family:var(--mono);font-size:12.5px;color:#cfe;background:rgba(0,0,0,.28);border-radius:0;margin:-18px -20px;padding:14px 16px;height:calc(100% + 36px);display:flex;flex-direction:column}
.term-out{flex:1;overflow:auto;white-space:pre-wrap;line-height:1.5}
.term-out .tp{color:var(--teal)}
.term-out .tw{color:var(--amber)}
.term-out .te{color:var(--magenta)}
.term-line{display:flex;gap:8px;align-items:center;margin-top:6px}
.term-line .tp{color:var(--teal)}
.term-in{flex:1;background:none;border:none;outline:none;color:#dff;font-family:var(--mono);font-size:12.5px}

/* file tree */
.tree details{margin:2px 0}
.tree summary{cursor:pointer;padding:2px 0;color:var(--ink)}
.tree summary::marker{color:var(--accent)}
.tree .f{padding:2px 0 2px 18px;color:var(--ink2);font-size:12.5px}
.tree .f .x{color:var(--ink3);font-size:11px;margin-left:6px}

/* calculator */
.calc{display:flex;flex-direction:column;height:100%;margin:-18px -20px}
.calc-disp{flex:0 0 auto;padding:18px 18px 10px;text-align:right;font-family:var(--mono);font-size:30px;color:var(--ink);overflow:hidden;text-overflow:ellipsis;min-height:64px}
.calc-grid{flex:1;display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:rgba(255,255,255,.06)}
.calc-grid button{all:unset;cursor:pointer;display:grid;place-items:center;font-size:18px;color:var(--ink);background:rgba(18,22,40,.5);transition:.12s;font-family:var(--ff)}
.calc-grid button:hover{background:rgba(255,255,255,.1)}
.calc-grid button.op{color:var(--teal)}
.calc-grid button.eq{background:linear-gradient(135deg,var(--teal),var(--violet));color:#06121a;font-weight:700}
.calc-grid button.span2{grid-column:span 2}

/* window resize handle */
.resize-h{position:absolute;right:0;bottom:0;width:18px;height:18px;cursor:nwse-resize;z-index:5}
.resize-h::after{content:"";position:absolute;right:3px;bottom:3px;width:8px;height:8px;border-right:2px solid rgba(255,255,255,.25);border-bottom:2px solid rgba(255,255,255,.25)}

/* notifications */
#notifs{position:fixed;top:50px;right:12px;z-index:9400;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.notif{min-width:230px;max-width:300px;border-radius:14px;padding:12px 14px;background:rgba(12,15,30,.92);backdrop-filter:blur(20px);border:1px solid var(--edge);box-shadow:0 20px 60px rgba(0,0,0,.5);transform:translateX(120%);transition:transform .4s cubic-bezier(.2,.9,.3,1);pointer-events:auto}
.notif.on{transform:none}
.notif .nt{display:flex;align-items:center;gap:9px;font-size:13px;font-weight:600;color:var(--ink)}
.notif .ni{width:24px;height:24px;display:grid;place-items:center;border-radius:7px;background:rgba(255,255,255,.06);color:var(--accent)}
.notif .ni svg{width:15px;height:15px}
.notif .nm{font-size:12px;color:var(--ink3);margin-top:5px;line-height:1.45}

/* editor */
.ed{display:flex;height:100%;margin:-18px -20px}
.ed-side{flex:0 0 152px;border-right:1px solid rgba(255,255,255,.08);display:flex;flex-direction:column;background:rgba(0,0,0,.14)}
.ed-new{all:unset;cursor:pointer;text-align:center;padding:11px;font-size:12.5px;color:var(--teal);border-bottom:1px solid rgba(255,255,255,.08)}
.ed-new:hover{background:rgba(255,255,255,.06)}
.ed-list{flex:1;overflow:auto}
.ed-item{padding:10px 12px;font-size:12.5px;color:var(--ink2);cursor:pointer;border-bottom:1px solid rgba(255,255,255,.04);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ed-item:hover{background:rgba(255,255,255,.05)}
.ed-item.on{background:rgba(45,226,198,.14);color:var(--ink)}
.ed-empty{padding:14px 12px;font-size:12px;color:var(--ink3)}
.ed-main{flex:1;display:flex;flex-direction:column;min-width:0}
.ed-title{background:none;border:none;outline:none;color:var(--ink);font-family:var(--ff);font-size:15px;font-weight:600;padding:12px 16px 6px}
.ed-body{flex:1;background:none;border:none;outline:none;resize:none;color:var(--ink2);font-family:var(--ff);font-size:13.5px;line-height:1.6;padding:4px 16px 12px}
.ed-bar{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;border-top:1px solid rgba(255,255,255,.08);font-size:11.5px;color:var(--ink3)}
.ed-del{all:unset;cursor:pointer;color:var(--magenta);font-size:12px;padding:3px 9px;border-radius:8px}
.ed-del:hover{background:rgba(255,109,176,.15)}
.ed-del:disabled{opacity:.4;cursor:default}

/* clock / timer */
.clk{display:flex;flex-direction:column;align-items:center;gap:12px}
.clk-now{font-size:40px;font-weight:300;font-variant-numeric:tabular-nums;letter-spacing:1px;margin-top:4px}
.clk-date{font-size:12.5px;color:var(--ink3);margin-top:-6px}
.clk-card{width:100%;background:var(--glass2);border:1px solid var(--edge);border-radius:14px;padding:12px 14px;text-align:center}
.clk-card h4{font-size:12px;color:var(--ink3);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.clk-disp{font-family:var(--mono);font-size:30px;color:var(--ink);font-variant-numeric:tabular-nums}
.clk-row{display:flex;gap:8px;justify-content:center;margin-top:9px}
.clk-row button{all:unset;cursor:pointer;padding:7px 14px;border-radius:10px;background:rgba(255,255,255,.05);border:1px solid var(--edge);font-size:12.5px;color:var(--ink2)}
.clk-row button:hover{background:rgba(255,255,255,.1);color:var(--ink)}

/* context menu */
#ctx{position:fixed;z-index:9600;min-width:190px;border-radius:12px;padding:6px;display:none;
  background:rgba(12,15,30,.95);backdrop-filter:blur(20px);border:1px solid var(--edge);box-shadow:0 24px 70px rgba(0,0,0,.6)}
#ctx.on{display:block}
#ctx .ci{display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:9px;font-size:13px;color:var(--ink2);cursor:pointer}
#ctx .ci:hover{background:rgba(139,109,255,.18);color:var(--ink)}
#ctx .sep{height:1px;background:rgba(255,255,255,.08);margin:4px 6px}

/* toast hint */
#hint{position:fixed;bottom:92px;left:50%;transform:translateX(-50%);z-index:9001;
  background:rgba(12,15,30,.9);border:1px solid var(--edge);border-radius:999px;padding:9px 16px;font-size:12.5px;color:var(--ink2);
  box-shadow:0 16px 40px rgba(0,0,0,.4);opacity:0;transition:opacity .4s;pointer-events:none}
#hint.on{opacity:1}
#hint b{color:var(--teal)}

/* lock screen */
#lock{position:fixed;inset:0;z-index:10000;display:grid;place-items:center;cursor:pointer;
  background:rgba(4,5,13,.35);backdrop-filter:blur(3px);transition:opacity .6s}
#lock.gone{opacity:0;pointer-events:none}
#lock .lc{text-align:center}
#lock .lclock{font-size:78px;font-weight:300;letter-spacing:2px;font-variant-numeric:tabular-nums;text-shadow:0 4px 40px rgba(139,109,255,.4)}
#lock .ldate{font-size:15px;color:var(--ink2);margin-top:-4px;letter-spacing:.5px}
#lock .luser{margin-top:42px;display:flex;flex-direction:column;align-items:center;gap:12px}
#lock .lav{width:74px;height:74px;border-radius:50%;background:radial-gradient(circle at 38% 34%,#fff,#c3b0ff 30%,#6f4ff0 64%,#241a63);box-shadow:0 0 50px -6px var(--violet)}
#lock .lname{font-size:15px;font-weight:600}
#lock .lhint{font-size:12.5px;color:var(--ink3);margin-top:8px;letter-spacing:.5px}
#lock .lbadge{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);font-size:11px;color:var(--ink3);letter-spacing:.4px}
#lock .lbadge b{color:var(--amber)}

/* boot */
#boot{position:fixed;inset:0;z-index:10001;display:grid;place-items:center;background:#05060f;transition:opacity .7s}
#boot.gone{opacity:0;pointer-events:none}
#boot .c{text-align:center}
#boot .borb{width:74px;height:74px;margin:0 auto 20px;border-radius:50%;background:radial-gradient(circle at 38% 34%,#fff,#c3b0ff 30%,#6f4ff0 64%,#241a63);box-shadow:0 0 64px -4px var(--violet),0 0 130px -16px var(--magenta);animation:breathe 3s ease-in-out infinite}
@keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
#boot h1{font-size:24px;letter-spacing:3px}
#boot .t{margin-top:7px;font-size:11px;color:var(--ink3);letter-spacing:2px;text-transform:uppercase}
#boot .bar{margin:22px auto 0;width:190px;height:3px;border-radius:3px;background:rgba(255,255,255,.08);overflow:hidden}
#boot .bar i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--teal),var(--violet),var(--magenta));animation:load 1.9s ease forwards}
@keyframes load{to{width:100%}}
</style>

<script>
"use strict";
/* THUOS · Aurora — a futuristic, original DESKTOP ENVIRONMENT.
   Boot -> lock -> desktop -> dock -> windows you open, drag, stack.

/* ---------- app registry ---------- */
function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

/* unified monoline icon set (stroke = currentColor, inherits each app accent) */

const ICON={

};

const ROAD=[
 [1,'Boot-verify di QEMU','lalu hardware — tanpa ini, "host-tested" belum tervalidasi runtime',0,'',''],
 [2,'Aktifkan paging + isolasi','page directory, CR3/CR0.PG, #PF handler, higher-half',1,'tersulit #1','Begitu MMU dinyalakan, satu salah isi tabel halaman → CPU tak bisa ambil instruksi berikutnya → reboot diam (triple-fault) tanpa pesan error. Rintangan pertama yang paling sering mematikan OS pemula.'],
 [3,'Context switch + scheduler preemptif','save/restore register per-proses, didorong timer',1,'race','Salah timing/penguncian saat berganti proses → register bocor antar-proses atau stack korup → crash acak yang sangat sulit ditiru ulang ("race condition").'],
 [4,'Ring 3 + syscall hidup','TSS (ltr), int 0x80 DPL-3, iret ke user, fault policy',1,'tersulit #2','Lompatan pertama dari kernel (ring 0) ke program user (ring 3). Salah sedikit di TSS / level privilege / descriptor → #GP atau triple-fault. Terkenal rewel.'],
 [5,'Filesystem writable + driver blok','ATA/AHCI/virtio, lalu FS R/W (FAT/ext2)',1,'crash-konsistensi','Kalau mati listrik / crash di tengah menulis, filesystem bisa tertinggal setengah-terupdate → korup. Menjaga urutan penulisan (journaling) supaya tetap konsisten itu sulit.'],
 [6,'libc + POSIX','port newlib/musl → program nyata bisa jalan',0,'',''],
 [7,'Networking (TCP/IP)','driver NIC (e1000/virtio-net) + stack (lwIP)',0,'',''],
 [8,'Userland + shell + self-hosting','toolchain jalan di atas THUOS, ala Linux From Scratch',0,'',''],
 [9,'SMP / multi-core + fitur masa depan','lalu microkernel-ish / Rust',0,'',''],
];

 realita:{name:'Realita',icon:'⚑',accent:'#ffcf76',w:560,h:440,body:()=>`

 terminal:{name:'Terminal',icon:'›_',accent:'#54e6a6',w:560,h:380,body:()=>`
   <div class="term"><div class="term-out" id="termOut"></div>
   <div class="term-line"><span class="tp">thu@aurora</span>:~$ <input class="term-in" id="termIn" autocomplete="off" spellcheck="false" placeholder="ketik 'help'"></div></div>`,
   mount:(win)=>{
     const out=win.querySelector('#termOut'), inp=win.querySelector('#termIn');
     const P='<span class="tp">thu@aurora</span>:~$ ';
     function pr(h){const d=document.createElement('div');d.innerHTML=h;out.appendChild(d);out.scrollTop=out.scrollHeight;}
     const banner=
'<span class="tp">  ▟▛ THUOS · Aurora — concept shell</span>\n'+
'  versi 0.4.0 "Kernel Heap" · target i386 · Multiboot 1\n'+
'  <span class="tw">catatan: ini shell KONSEP (browser). Kernel THUOS asli kini boot-verified di QEMU (CI).</span>\n'+
"  ketik 'help' untuk daftar perintah.\n";
     pr(banner);
     const CMD={
       help:()=>"perintah: help · status · ver · ls · roadmap · about · neofetch · whoami · clear",
       ver:()=>"THUOS 0.4.0 \"Kernel Heap\" (i386, Multiboot 1)",
       version:()=>CMD.ver(),
       whoami:()=>"thu",
       status:()=>'tahap: boot-verified (QEMU/CI)\nhost-tested: ya (PMM+heap+paging+sched)\ncontext-switch nyata: belum\nring-3 + syscall: langkah berikutnya\nfilesystem: belum ada\n<span class="tw">BOOT-VERIFIED: ya (QEMU via CI)</span>',
       ls:()=>'<span class="tp">bin/</span>  <span class="tp">dev/</span>  <span class="tp">etc/</span>  init  hello   <span class="te">(konsep VFS read-only)</span>',
       roadmap:()=>ROAD.map(s=>(s[3]?'<span class="te">●</span> ':'<span class="tp">●</span> ')+s[0]+'. '+s[1]).join('\n'),
       about:()=>"THUOS: OS hobi x86 dari nol. Bukan distro Linux, bukan skin UI, bukan simulator palsu.\nDibangun jujur, subsistem demi subsistem.",
       neofetch:()=>
'<span class="tp">      ▟█▙      </span>  thu@aurora\n'+
'<span class="tp">     ▟███▙     </span>  ----------\n'+
'<span class="tp">    ▟█▛ ▜█▙    </span>  OS:     THUOS 0.4.0 (konsep)\n'+
'<span class="tp">   ▟█▛   ▜█▙   </span>  Kernel: i386 from-scratch\n'+
'<span class="tp">   ▜█▙   ▟█▛   </span>  Boot:   <span class="tw">belum (host-tested)</span>\n'+
'<span class="tp">    ▜█▙ ▟█▛    </span>  UI:     Aurora (desktop konsep)\n'+
'<span class="tp">     ▜███▛     </span>  Shell:  concept\n'+
'<span class="tp">      ▜█▛      </span>  Status: boot-verified (QEMU/CI)',
       clear:()=>{out.innerHTML='';return null;}
     };
     function run(c){
       if(!c)return;
       const key=c.split(/\s+/)[0].toLowerCase();
       if(CMD[key]){const r=CMD[key]();if(r!==null&&r!==undefined)pr(r);}
       else pr('<span class="te">perintah tak dikenal:</span> '+esc(key)+" — coba 'help'");
     }
     inp.addEventListener('keydown',e=>{
       if(e.key==='Enter'){const c=inp.value;pr(P+esc(c));run(c.trim());inp.value='';}
     });
     setTimeout(()=>inp.focus(),60);
     win.addEventListener('pointerdown',()=>setTimeout(()=>inp.focus(),0));
   }},

 guide:{name:'Panduan Aurora',icon:'⤢',accent:'#8b6dff',w:520,h:440,body:()=>`
   <h3>Panduan Aurora</h3><div class="ps">cara pakai · &amp; kenapa tampilannya begini</div>

 calc:{name:'Kalkulator',icon:'',accent:'#54e6a6',w:280,h:380,body:()=>`
   <div class="calc"><div class="calc-disp" id="calcDisp">0</div>
     <div class="calc-grid">
       <button data-k="C" class="op span2">C</button><button data-k="←" class="op">←</button><button data-k="/" class="op">÷</button>
       <button data-k="7">7</button><button data-k="8">8</button><button data-k="9">9</button><button data-k="*" class="op">×</button>
       <button data-k="4">4</button><button data-k="5">5</button><button data-k="6">6</button><button data-k="-" class="op">−</button>
       <button data-k="1">1</button><button data-k="2">2</button><button data-k="3">3</button><button data-k="+" class="op">+</button>
       <button data-k="0" class="span2">0</button><button data-k=".">.</button><button data-k="=" class="eq">=</button>
     </div></div>`,
   mount:(win)=>{
     const disp=win.querySelector('#calcDisp');
     let cur='0',prev=null,op=null,fresh=true;
     function show(){disp.textContent=(cur.length>12&&!isNaN(Number(cur)))?Number(cur).toPrecision(10):cur;}
     function ev(a,b,o){a=parseFloat(a);b=parseFloat(b);return o==='+'?a+b:o==='-'?a-b:o==='*'?a*b:o==='/'?(b===0?'∞':a/b):b;}
     function press(k){
       if(k==='C'){cur='0';prev=null;op=null;fresh=true;}
       else if(k==='←'){cur=cur.length>1?cur.slice(0,-1):'0';}
       else if(k==='.'){if(!cur.includes('.'))cur+='.';}
       else if('+-*/'.includes(k)){if(op&&!fresh){cur=String(ev(prev,cur,op));}prev=cur;op=k;fresh=true;}
       else if(k==='='){if(op){cur=String(ev(prev,cur,op));op=null;prev=null;fresh=true;}}
       else{if(fresh||cur==='0'){cur=k;fresh=false;}else{cur+=k;}}
       show();
     }
     win.querySelectorAll('.calc-grid button').forEach(b=>b.addEventListener('click',()=>press(b.dataset.k)));
     show();
   }},

 editor:{name:'Editor',icon:'',accent:'#2de2c6',w:560,h:420,body:()=>`
   <div class="ed">
     <div class="ed-side"><button class="ed-new" id="edNew">＋ Dokumen baru</button><div class="ed-list" id="edList"></div></div>
     <div class="ed-main">
       <input class="ed-title" id="edTitle" placeholder="Judul…" disabled>
       <textarea class="ed-body" id="edBody" spellcheck="false" placeholder="Pilih atau buat dokumen…" disabled></textarea>
       <div class="ed-bar"><span id="edStat">local-first · tersimpan di perangkatmu</span><button class="ed-del" id="edDel" disabled>Hapus</button></div>
     </div></div>`,
   mount:(win)=>{
     const KEY='thuos_docs';
     const listEl=win.querySelector('#edList'),titleEl=win.querySelector('#edTitle'),
           bodyEl=win.querySelector('#edBody'),statEl=win.querySelector('#edStat'),delEl=win.querySelector('#edDel');
     let docs=[],cur=null,tmr=null;
     function load(){try{docs=JSON.parse(localStorage.getItem(KEY)||'[]');}catch(e){docs=[];}if(!Array.isArray(docs))docs=[];}
     function persist(){try{localStorage.setItem(KEY,JSON.stringify(docs));}catch(e){}}
     function fmt(){return new Date().toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});}
     function curDoc(){return docs.find(x=>x.id===cur);}
     function renderList(){
       if(!docs.length){listEl.innerHTML='<div class="ed-empty">belum ada dokumen</div>';return;}
       listEl.innerHTML=docs.map(d=>'<div class="ed-item'+(d.id===cur?' on':'')+'" data-id="'+d.id+'">'+(esc(d.title)||'(tanpa judul)')+'</div>').join('');
       listEl.querySelectorAll('.ed-item').forEach(it=>it.addEventListener('click',()=>select(Number(it.dataset.id))));
     }
     function select(id){const d=docs.find(x=>x.id===id);if(!d)return;cur=id;titleEl.disabled=bodyEl.disabled=delEl.disabled=false;titleEl.value=d.title;bodyEl.value=d.body;renderList();}
     function saveDoc(){const d=curDoc();if(!d)return;d.title=titleEl.value;d.body=bodyEl.value;persist();statEl.textContent='tersimpan ✓ '+fmt();renderList();}
     function schedule(){statEl.textContent='menyimpan…';clearTimeout(tmr);tmr=setTimeout(saveDoc,350);}
     win.querySelector('#edNew').addEventListener('click',()=>{const d={id:Date.now(),title:'Dokumen',body:''};docs.unshift(d);persist();select(d.id);titleEl.focus();titleEl.select();});
     titleEl.addEventListener('input',schedule);
     bodyEl.addEventListener('input',schedule);
     delEl.addEventListener('click',()=>{if(cur==null)return;docs=docs.filter(x=>x.id!==cur);cur=null;persist();titleEl.value='';bodyEl.value='';titleEl.disabled=bodyEl.disabled=delEl.disabled=true;renderList();statEl.textContent='dihapus';});
     load();renderList();
   }},

 clock:{name:'Jam',icon:'',accent:'#ff6db0',w:340,h:430,body:()=>`
   <div class="clk">
     <div class="clk-now" id="clkNow">--:--:--</div><div class="clk-date" id="clkDate">—</div>
     <div class="clk-card"><h4>Timer</h4><div class="clk-disp" id="tmDisp">00:00</div>
       <div class="clk-row"><button data-tm="60">1m</button><button data-tm="300">5m</button><button data-tm="600">10m</button></div>

   mount:(win)=>{

     tn();const ci=setInterval(tn,1000);
     let tmLeft=0,tmRun=false,tmI=null;const tmDisp=win.querySelector('#tmDisp'),tmStart=win.querySelector('#tmStart');
     function tmShow(){tmDisp.textContent=pad(Math.floor(tmLeft/60))+':'+pad(tmLeft%60);}

     tmStart.addEventListener('click',()=>{if(tmRun){tmRun=false;clearInterval(tmI);tmStart.textContent='Mulai';return;}if(tmLeft<=0)return;tmRun=true;tmStart.textContent='Jeda';tmI=setInterval(()=>{if(tmLeft>0){tmLeft--;tmShow();}if(tmLeft<=0){clearInterval(tmI);tmRun=false;tmStart.textContent='Mulai';notify('Timer selesai','Waktu habis','clock');}},1000);});
     win.querySelector('#tmReset').addEventListener('click',()=>{clearInterval(tmI);tmRun=false;tmLeft=0;tmShow();tmStart.textContent='Mulai';});
     tmShow();
     let swMs=0,swRun=false,swI=null,swT0=0;const swDisp=win.querySelector('#swDisp'),swStart=win.querySelector('#swStart');
     function swFmt(t){return pad(Math.floor(t/60000))+':'+pad(Math.floor((t%60000)/1000))+'.'+Math.floor((t%1000)/100);}
     function swShow(){swDisp.textContent=swFmt(swMs);}
     swStart.addEventListener('click',()=>{if(swRun){swRun=false;clearInterval(swI);swMs+=Date.now()-swT0;swStart.textContent='Mulai';swShow();return;}swRun=true;swT0=Date.now();swStart.textContent='Jeda';swI=setInterval(()=>{swDisp.textContent=swFmt(swMs+(Date.now()-swT0));},100);});
     win.querySelector('#swReset').addEventListener('click',()=>{clearInterval(swI);swRun=false;swMs=0;swT0=0;swShow();swStart.textContent='Mulai';});
     swShow();
     win.addEventListener('thuosclose',()=>{clearInterval(ci);clearInterval(tmI);clearInterval(swI);});
   }},
};

const DOCK_ORDER=['realita','roadmap','terminal','files','notes','editor','calc','clock','monitor','guide','settings','about'];

/* ---------- window manager ---------- */
const desk=document.getElementById('desk');
const wins={}; let zTop=100; let activeId=null;
const MENUBAR=42, DOCKSP=104;

function buildDock(){
  const dock=document.getElementById('dock');
  dock.innerHTML='';
  DOCK_ORDER.forEach(id=>{
    const a=APPS[id];
    const it=document.createElement('div');
    it.className='dockitem'; it.dataset.app=id; it.style.setProperty('--dc',a.accent);
    it.innerHTML='<div class="di">'+(ICON[id]||a.icon)+'</div><div class="dl">'+a.name+'</div><span class="run"></span>';
    it.addEventListener('click',()=>openApp(id));
    dock.appendChild(it);
  });
}
function dockState(){
  document.querySelectorAll('.dockitem').forEach(it=>{
    const id=it.dataset.app;
    it.classList.toggle('running', !!wins[id]);
  });
}
function focusWin(id){
  if(!wins[id])return;
  if(activeId&&wins[activeId]) wins[activeId].el.classList.remove('active');
  activeId=id; const w=wins[id];
  w.el.style.zIndex=(++zTop); w.el.classList.add('active');
  document.getElementById('mbApp').textContent=APPS[id].name;
}
function openApp(id){
  const a=APPS[id]; if(!a) return;
  if(wins[id]){ const w=wins[id]; if(w.min){w.el.style.display='flex';w.min=false;} focusWin(id); return; }
  const win=document.createElement('div');
  win.className='win'; win.style.setProperty('--accent',a.accent);
  win.style.width=a.w+'px'; win.style.height=a.h+'px';
  const n=Object.keys(wins).length;
  let left=(innerWidth-a.w)/2 + (n%5)*28 - 56;
  let top =MENUBAR+18 + (n%5)*24 + Math.max(0,(innerHeight-MENUBAR-DOCKSP-a.h)/2 - 30);
  left=Math.max(8,Math.min(left,innerWidth-a.w-8));
  top =Math.max(MENUBAR+6,Math.min(top,innerHeight-DOCKSP-80));
  win.style.left=left+'px'; win.style.top=top+'px';
  win.innerHTML=
    '<div class="titlebar"><div class="lights"><button class="wbtn close" title="Tutup"></button><button class="wbtn min" title="Kecilkan"></button><button class="wbtn max" title="Perbesar"></button></div>'+
    '<span class="wicon">'+(ICON[id]||a.icon)+'</span><span class="wtitle">'+a.name+'</span><span class="wsp"></span></div>'+
    '<div class="winbody">'+a.body()+'</div><div class="resize-h"></div>';
  desk.appendChild(win);
  wins[id]={el:win,min:false,max:false,prev:null};
  // controls
  const tb=win.querySelector('.titlebar');
  win.querySelector('.min').addEventListener('click',e=>{e.stopPropagation();wins[id].el.style.display='none';wins[id].min=true;dockState();});
  win.querySelector('.max').addEventListener('click',e=>{e.stopPropagation();toggleMax(id);});
  win.querySelector('.close').addEventListener('click',e=>{e.stopPropagation();closeApp(id);});
  tb.addEventListener('dblclick',()=>toggleMax(id));
  win.addEventListener('pointerdown',()=>focusWin(id));
  dragify(win,tb,id); resizify(win,id);
  focusWin(id); dockState();
  if(a.mount) a.mount(win);
  hideHint();
}
function closeApp(id){ if(!wins[id])return;
  try{wins[id].el.dispatchEvent(new CustomEvent('thuosclose'));}catch(e){}
  wins[id].el.remove(); delete wins[id];
  if(activeId===id){activeId=null;document.getElementById('mbApp').textContent='THUOS';} dockState(); }
function toggleMax(id){
  const w=wins[id]; if(!w)return; const el=w.el;
  if(!w.max){ w.prev={left:el.style.left,top:el.style.top,width:el.style.width,height:el.style.height};
    el.style.left='8px'; el.style.top=(MENUBAR+6)+'px';
    el.style.width=(innerWidth-16)+'px'; el.style.height=(innerHeight-MENUBAR-DOCKSP-2)+'px'; w.max=true;
  } else { Object.assign(el.style,w.prev); w.max=false; }
  focusWin(id);
}
function dragify(win,handle,id){
  let sx,sy,ox,oy,drag=false,pid=null;
  handle.addEventListener('pointerdown',e=>{
    if(e.target.closest('.wbtn'))return;
    if(wins[id].max)return;
    drag=true;pid=e.pointerId;sx=e.clientX;sy=e.clientY;
    ox=parseFloat(win.style.left);oy=parseFloat(win.style.top);
    handle.classList.add('drag');handle.setPointerCapture(pid);focusWin(id);
  });
  handle.addEventListener('pointermove',e=>{
    if(!drag||e.pointerId!==pid)return;
    let nx=ox+(e.clientX-sx), ny=oy+(e.clientY-sy);
    nx=Math.max(-(win.offsetWidth-80),Math.min(nx,innerWidth-80));
    ny=Math.max(MENUBAR+2,Math.min(ny,innerHeight-60));
    win.style.left=nx+'px';win.style.top=ny+'px';
  });
  function up(e){if(e.pointerId===pid){drag=false;handle.classList.remove('drag');}}
  handle.addEventListener('pointerup',up);
  handle.addEventListener('pointercancel',up);
}
function resizify(win,id){
  const h=win.querySelector('.resize-h'); if(!h)return;
  let sw,sh,sx,sy,res=false,pid=null;
  h.addEventListener('pointerdown',e=>{
    if(wins[id]&&wins[id].max)return;
    res=true;pid=e.pointerId;sx=e.clientX;sy=e.clientY;sw=win.offsetWidth;sh=win.offsetHeight;
    h.setPointerCapture(pid);focusWin(id);e.stopPropagation();
  });
  h.addEventListener('pointermove',e=>{
    if(!res||e.pointerId!==pid)return;
    win.style.width=Math.max(260,Math.min(sw+(e.clientX-sx),innerWidth-20))+'px';
    win.style.height=Math.max(170,Math.min(sh+(e.clientY-sy),innerHeight-MENUBAR-20))+'px';
  });
  function up(e){if(e.pointerId===pid)res=false;}
  h.addEventListener('pointerup',up);h.addEventListener('pointercancel',up);
}

/* ---------- settings / control center wiring ---------- */
function save(k,v){try{localStorage.setItem(k,v);}catch(e){}}
function setAccent(c){
  document.documentElement.style.setProperty('--accent',c);
  document.documentElement.style.setProperty('--violet',c);
  document.querySelectorAll('[data-acc]').forEach(s=>s.classList.toggle('sel',s.dataset.acc===c));
  save('thuos_accent',c);
}
function setBrightness(v){document.getElementById('dim').style.opacity=(v/100);
  document.querySelectorAll('[data-bind="brightness"],#brightness').forEach(i=>{if(i.value!=v)i.value=v;});save('thuos_bright',v);}
function setMotion(on){document.body.classList.toggle('reduce',on);
  document.querySelectorAll('[data-bind="motion"],#tgMotion').forEach(t=>t.classList.toggle('on',on));save('thuos_motion',on?'1':'0');}
function setWall(w){const sky=document.getElementById('sky');sky.className=w||'';
  document.querySelectorAll('[data-wall]').forEach(b=>b.classList.toggle('sel',(b.dataset.wall||'')===(w||'')));save('thuos_wall',w||'');}
function loadSettings(){try{
  const a=localStorage.getItem('thuos_accent'); if(a)setAccent(a);
  const b=localStorage.getItem('thuos_bright'); if(b!==null)setBrightness(b);
  if(localStorage.getItem('thuos_motion')==='1')setMotion(true);
  const w=localStorage.getItem('thuos_wall'); if(w!==null)setWall(w);
}catch(e){}}
function syncSettingsUI(win){try{
  const a=localStorage.getItem('thuos_accent'); if(a)win.querySelectorAll('[data-acc]').forEach(s=>s.classList.toggle('sel',s.dataset.acc===a));
  const b=localStorage.getItem('thuos_bright'); if(b!==null){const sl=win.querySelector('[data-bind="brightness"]');if(sl)sl.value=b;}
  const tg=win.querySelector('[data-bind="motion"]'); if(tg)tg.classList.toggle('on',localStorage.getItem('thuos_motion')==='1');
  const w=localStorage.getItem('thuos_wall'); win.querySelectorAll('[data-wall]').forEach(x=>x.classList.toggle('sel',(x.dataset.wall||'')===(w||'')));
}catch(e){}}

document.addEventListener('click',e=>{
  const open=e.target.closest('[data-open]'); if(open){openApp(open.dataset.open);return;}
  const acc=e.target.closest('[data-acc]'); if(acc){setAccent(acc.dataset.acc);return;}
  const wall=e.target.closest('[data-wall]'); if(wall){setWall(wall.dataset.wall);return;}
  const tg=e.target.closest('.toggle'); if(tg&&(tg.id==='tgMotion'||tg.dataset.bind==='motion')){setMotion(!tg.classList.contains('on'));return;}
});
document.addEventListener('input',e=>{
  if(e.target.matches('[data-bind="brightness"],#brightness')) setBrightness(e.target.value);
});

/* control center */
const cc=document.getElementById('cc');
const ccBtn=document.getElementById('ccBtn'); ccBtn.innerHTML=ICON.cc;
ccBtn.addEventListener('click',e=>{e.stopPropagation();cc.classList.toggle('on');});
document.addEventListener('pointerdown',e=>{if(!e.target.closest('#cc,#ccBtn'))cc.classList.remove('on');});

/* ---------- desktop context menu ---------- */
const ctx=document.getElementById('ctx');
const CTX=[['editor','Editor'],['notes','Catatan'],['terminal','Terminal'],['files','Berkas'],['clock','Jam'],['settings','Pengaturan'],['sep'],['guide','Panduan'],['about','Tentang']];
ctx.innerHTML=CTX.map(c=>c[0]==='sep'?'<div class="sep"></div>':'<div class="ci" data-open="'+c[0]+'"><span class="ci-ic">'+(ICON[c[0]]||'')+'</span>'+c[1]+'</div>').join('');
desk.addEventListener('contextmenu',e=>{
  if(e.target.closest('.win,#dock,#menubar,#cc'))return;
  e.preventDefault();
  ctx.style.left=Math.min(e.clientX,innerWidth-210)+'px';
  ctx.style.top=Math.min(e.clientY,innerHeight-220)+'px';
  ctx.classList.add('on');
});
document.addEventListener('pointerdown',e=>{if(!e.target.closest('#ctx'))ctx.classList.remove('on');});
ctx.addEventListener('click',()=>ctx.classList.remove('on'));

/* ---------- clock + vitals ---------- */
const t0=Date.now();
const DAYS=['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
const MON=['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
function hhmm(d){return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');}
function tick(){
  const d=new Date();
  const c=document.getElementById('clock'); if(c)c.textContent=hhmm(d);
  const lc=document.getElementById('lclock'); if(lc)lc.textContent=hhmm(d);
  const ld=document.getElementById('ldate'); if(ld)ld.textContent=DAYS[d.getDay()]+', '+d.getDate()+' '+MON[d.getMonth()]+' '+d.getFullYear();
}
let gv={cpu:14,mem:36,io:9};
function clamp(v,a,b){return v<a?a:v>b?b:v;}
function vitals(){
  gv.cpu=clamp(gv.cpu+(Math.random()*16-8),5,74);
  gv.mem=clamp(gv.mem+(Math.random()*6-3),24,70);
  gv.io =clamp(gv.io +(Math.random()*22-11),0,58);
  const tx=(id,v)=>{const e=document.getElementById(id);if(e)e.textContent=Math.round(v)+'%';};
  const bw=(id,v)=>{const e=document.getElementById(id);if(e)e.style.width=v+'%';};
  tx('vcpu',gv.cpu);tx('vmem',gv.mem);tx('tcpu',gv.cpu);tx('tmem',gv.mem);tx('tio',gv.io);
  bw('gcpu',gv.cpu);bw('gmem',gv.mem);bw('gio',gv.io);
}
tick();vitals();setInterval(tick,1000);setInterval(vitals,1500);

/* ---------- starfield ---------- */
const sc=document.getElementById('stars'),sx=sc.getContext('2d');
let stars=[],vw=innerWidth,vh=innerHeight;
function initStars(){sc.width=vw=innerWidth;sc.height=vh=innerHeight;stars=[];
  const n=Math.round(vw*vh/14000);
  for(let i=0;i<n;i++)stars.push({x:Math.random()*vw,y:Math.random()*vh,r:Math.random()*1.2+.2,t:Math.random()*6.28,z:Math.random()*.7+.3});}
function drawStars(now){sx.clearRect(0,0,vw,vh);
  for(const s of stars){const tw=.5+.5*Math.sin(now/1000+s.t);sx.globalAlpha=tw*s.z*.8;
    sx.fillStyle=s.z>.7?'#dfe8ff':'#aebfe8';sx.beginPath();sx.arc(s.x,s.y,s.r,0,7);sx.fill();}
  sx.globalAlpha=1;requestAnimationFrame(drawStars);}
addEventListener('resize',initStars);
initStars();requestAnimationFrame(drawStars);

/* ---------- hint toast ---------- */
const hint=document.getElementById('hint');
function showHint(html){hint.innerHTML=html;hint.classList.add('on');}
function hideHint(){hint.classList.remove('on');}
const notifs=document.getElementById('notifs');
function notify(title,msg,icon){
  const n=document.createElement('div');n.className='notif';
  n.innerHTML='<div class="nt"><span class="ni">'+(ICON[icon]||icon||'')+'</span>'+title+'</div>'+(msg?'<div class="nm">'+msg+'</div>':'');
  notifs.appendChild(n);
  requestAnimationFrame(()=>n.classList.add('on'));
  setTimeout(()=>{n.classList.remove('on');setTimeout(()=>n.remove(),420);},4200);
}

/* ---------- boot + lock ---------- */
const lock=document.getElementById('lock'); let unlocked=false;
function unlock(){
  if(unlocked)return; unlocked=true;
  lock.classList.add('gone');
  setTimeout(()=>{lock.style.display='none';
    openApp('welcome');
    notify('Selamat datang, thu','THUOS Aurora siap. Buka aplikasi dari dock di bawah.','welcome');
    showHint('Buka aplikasi dari <b>dock</b> di bawah ↓ · klik-kanan desktop untuk menu');
    setTimeout(hideHint,5200);
  },520);
}
lock.addEventListener('click',unlock);
addEventListener('keydown',e=>{
  if(!unlocked){ if(e.key==='Enter'||e.key===' ') unlock(); return; }
  if(e.key==='Escape'){cc.classList.remove('on');ctx.classList.remove('on');}
});
buildDock(); dockState(); loadSettings();
window.addEventListener('load',()=>{
  const b=document.getElementById('boot');
  setTimeout(()=>b.classList.add('gone'),2000);
  setTimeout(()=>b.style.display='none',2900);
});
</script>
